exclude = [
  "cliff.toml",
  "crates/fetcher/res/feeds/podcasts/*.toml",
  "crates/fetcher/res/feeds/youtube.com/*.toml",
  "release.toml",
]

[formatting]
array_auto_collapse  = false
array_auto_expand    = true
array_trailing_comma = true

align_comments = true
align_entries  = true

compact_arrays        = false
compact_entries       = false
compact_inline_tables = false

inline_table_expand = true

column_width = 40

indent_entries = false
indent_tables  = false

trailing_newline = true

reorder_arrays        = true
reorder_inline_tables = true
reorder_keys          = true

allowed_blank_lines = 1

crlf = false

[[rule]]
include = [
  "crates/fetcher/res/config.toml",
  "crates/fetcher/res/docker.toml",
]
schema = { path = "crates/schemas/fetcher/config.schema.json" }

[[rule]]
include = [
  "crates/fetcher/res/domains.toml",
]
schema = { path = "crates/schemas/fetcher/domains.schema.json" }

[[rule]]
include = [
  "crates/fetcher/res/categories.toml",
]
schema = { path = "crates/schemas/fetcher/categories.schema.json" }

[[rule]]
include = [
  "crates/fetcher/res/feeds/**/global.toml",
]
schema = { path = "crates/schemas/fetcher/global.schema.json" }

[[rule]]
exclude = [
  "crates/fetcher/res/feeds/**/global.toml",
  "crates/fetcher/res/feeds/youtube.com/**/*.toml",
]
include = [
  "crates/fetcher/res/feeds/**/*.toml",
]
schema = { path = "crates/schemas/fetcher/feeds.schema.json" }

[[rule]]
include = [
  "crates/server/res/config.toml",
]
schema = { path = "crates/schemas/server/server.schema.json" }
[[rule]]
include = [
  "crates/tui/res/config.toml",
]
schema = { path = "crates/schemas/tui/tui.schema.json" }
